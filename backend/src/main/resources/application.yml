spring:
  application:
    name: bydzov-ctverec-api
  datasource:
    hikari:
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000
      maximum-pool-size: 5
      minimum-idle: 0
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

jwt:
  secret: ${JWT_SECRET:default-dev-secret-change-in-production-at-least-64-chars-long!!}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
