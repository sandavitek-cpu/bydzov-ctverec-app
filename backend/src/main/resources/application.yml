spring:
  application:
    name: bydzov-ctverec-api
  datasource:
    hikari:
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000
      maximum-pool-size: 5
      minimum-idle: 0
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  mail:
    host: ${SMTP_HOST:smtp-relay.brevo.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

google:
  client-id: ${GOOGLE_CLIENT_ID:}

jwt:
  secret: ${JWT_SECRET:default-dev-secret-change-in-production-at-least-64-chars-long!!}

logging:
  file:
    name: ${LOG_FILE:logs/application.log}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{correlationId}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{correlationId}] - %msg%n"

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
