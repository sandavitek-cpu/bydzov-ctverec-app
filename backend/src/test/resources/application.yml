management:
  health:
    mail:
      enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 2525
    test-connection: false

jwt:
  secret: test-secret-key-that-is-at-least-64-characters-long-for-hmac-sha-test

google:
  client-id: ''
