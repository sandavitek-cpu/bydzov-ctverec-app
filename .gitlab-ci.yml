# =============================================================
# GitLab CI/CD Pipeline — Novobydžovský čtverec app
# =============================================================
# Stages:
#   1. test   — build + unit testy backendu
#   2. build  — build frontendu (Vue 3 + Vite)
#   3. deploy — GitLab Pages (frontend) + Render.com (backend)
# =============================================================
# Runner switching:
#   USE_RPI_RUNNER=true  -> jobs běží na Raspberry Pi runneru (tag: rpi)
#   USE_RPI_RUNNER!=true -> jobs běží na GitLab shared runneru
# =============================================================

stages:
  - test
  - build
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"

# Cache Maven dependencies
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository
    - frontend/node_modules/

# ----- Sdílené scripty (pro oba runner typy) -----
.test-backend: &test-backend
  - cd backend
  - mvn $MAVEN_CLI_OPTS test

.build-frontend: &build-frontend
  - cd frontend
  - npm ci
  - npm run build

# ---------------------------------------------------------------
# STAGE: test — Backend build + testy
# ---------------------------------------------------------------
backend-test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  script: *test-backend
  artifacts:
    when: always
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
  rules:
    - if: '$USE_RPI_RUNNER != "true" && ($CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event")'
      when: on_success
    - when: never

backend-test:rpi:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  tags: [rpi]
  script: *test-backend
  artifacts:
    when: always
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
  rules:
    - if: '$USE_RPI_RUNNER == "true" && ($CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event")'
      when: on_success
    - when: never

# ---------------------------------------------------------------
# STAGE: build — Frontend build
# ---------------------------------------------------------------
frontend-build:
  stage: build
  image: node:20-alpine
  variables:
    VITE_API_BASE_URL: "https://bydzov-ctverec-api.onrender.com"
    VITE_GOOGLE_CLIENT_ID: "$VITE_GOOGLE_CLIENT_ID"
  script: *build-frontend
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  rules:
    - if: '$USE_RPI_RUNNER != "true" && ($CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event")'
      when: on_success
    - when: never

frontend-build:rpi:
  stage: build
  image: node:20-alpine
  tags: [rpi]
  variables:
    VITE_API_BASE_URL: "https://bydzov-ctverec-api.onrender.com"
    VITE_GOOGLE_CLIENT_ID: "$VITE_GOOGLE_CLIENT_ID"
  script: *build-frontend
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  rules:
    - if: '$USE_RPI_RUNNER == "true" && ($CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event")'
      when: on_success
    - when: never

# ---------------------------------------------------------------
# STAGE: deploy — GitLab Pages (frontend)
# ---------------------------------------------------------------
pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -r frontend/dist/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$USE_RPI_RUNNER != "true" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  needs:
    - frontend-build

pages:rpi:
  stage: deploy
  image: alpine:latest
  tags: [rpi]
  script:
    - mkdir -p public
    - cp -r frontend/dist/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$USE_RPI_RUNNER == "true" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  needs:
    - frontend-build:rpi

# ---------------------------------------------------------------
# STAGE: deploy — Render.com (backend)
# ---------------------------------------------------------------
deploy-backend:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl jq
    - |
      if [ -z "$RENDER_DEPLOY_HOOK" ]; then
        echo "RENDER_DEPLOY_HOOK not set — skipping"
        exit 0
      fi

      echo "=== Spouštím deploy na Renderu ==="
      DEPLOY_RESPONSE=$(curl -s -X POST "$RENDER_DEPLOY_HOOK")
      echo "Deploy hook odpoved: $DEPLOY_RESPONSE"

      if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
        echo "RENDER_API_KEY nebo RENDER_SERVICE_ID není nastaveno — nelze sledovat průběh"
        exit 0
      fi

      echo "=== Sleduji průběh deploye (max 15 min) ==="
      for i in $(seq 1 45); do
        sleep 20
        DEPLOY=$(curl -s \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Accept: application/json" \
          "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1")

        echo "[$i/45] API odpoved: $DEPLOY"

        STATUS=$(echo "$DEPLOY" | jq -r 'if type == "array" then .[0].deploy.status else .message end // empty' 2>/dev/null || true)

        if [ -z "$STATUS" ] || [ "$STATUS" = "null" ]; then
          echo "[$i/45] Status nezjisten, čekám..."
          continue
        fi

        echo "[$i/45] Status: $STATUS"

        case "$STATUS" in
          live)
            echo "Deploy úspěšný!"
            exit 0
            ;;
          build_failed|update_failed|canceled|deactivated)
            echo "Deploy selhal: $STATUS"
            exit 1
            ;;
          created|queued|pre_deploy_in_progress|building|update_in_progress)
            echo "-> Deploy stále běží"
            ;;
          *)
            echo "-> Status: $STATUS (pokračuji)"
            ;;
        esac
      done

      echo "Deploy timeout po 15 minutách"
      exit 1
  rules:
    - if: '$USE_RPI_RUNNER != "true" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  needs:
    - backend-test

deploy-backend:rpi:
  stage: deploy
  tags: [rpi]
  script:
    - |
      if [ -z "$RENDER_DEPLOY_HOOK" ]; then
        echo "RENDER_DEPLOY_HOOK not set — skipping"
        exit 0
      fi

      echo "=== Spouštím deploy na Renderu ==="
      DEPLOY_RESPONSE=$(curl -s -X POST "$RENDER_DEPLOY_HOOK")
      echo "Deploy hook odpoved: $DEPLOY_RESPONSE"

      DEPLOY_ID=$(echo "$DEPLOY_RESPONSE" | jq -r '.deploy.id // empty' 2>/dev/null)
      if [ -n "$DEPLOY_ID" ]; then
        echo "Deploy spuštěn (ID: $DEPLOY_ID) — hotovo"
      else
        echo "Deploy se nepodařilo spustit"
        exit 0
      fi
  rules:
    - if: '$USE_RPI_RUNNER == "true" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  needs:
    - backend-test:rpi
