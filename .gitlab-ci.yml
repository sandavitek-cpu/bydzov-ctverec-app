# =============================================================
# GitLab CI/CD Pipeline — Novobydžovský čtverec app
# =============================================================
# Stages:
#   1. test   — build + unit testy backendu
#   2. build  — build frontendu (Vue 3 + Vite)
#   3. deploy — GitLab Pages (frontend) + Render.com (backend)
# =============================================================

stages:
  - test
  - build
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"

# Cache Maven dependencies
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository
    - frontend/node_modules/

# ---------------------------------------------------------------
# STAGE: test — Backend build + testy
# ---------------------------------------------------------------
backend-test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  script:
    - cd backend
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
  only:
    - main
    - merge_requests

# ---------------------------------------------------------------
# STAGE: build — Frontend build
# ---------------------------------------------------------------
frontend-build:
  stage: build
  image: node:20-alpine
  variables:
    # SPA volá API na Renderu (obejde DNS api.bydzov-ctverec.cz, dokud není hotová)
    VITE_API_BASE_URL: "https://bydzov-ctverec-api.onrender.com"
    # Pokud není v CI/CD variables nastaveno, Google tlačítko se nezobrazí
    VITE_GOOGLE_CLIENT_ID: "$VITE_GOOGLE_CLIENT_ID"
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  only:
    - main
    - merge_requests

# ---------------------------------------------------------------
# STAGE: deploy — GitLab Pages (frontend)
# ---------------------------------------------------------------
pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -r frontend/dist/* public/
  artifacts:
    paths:
      - public
  only:
    - main
  needs:
    - frontend-build

# ---------------------------------------------------------------
# STAGE: deploy — Render.com (backend)
# ---------------------------------------------------------------
deploy-backend:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl jq
    - |
      if [ -z "$RENDER_DEPLOY_HOOK" ]; then
        echo "RENDER_DEPLOY_HOOK not set — skipping backend deploy"
        exit 0
      fi

      echo "=== Spouštím deploy na Renderu ==="
      RESPONSE=$(curl -s -X POST "$RENDER_DEPLOY_HOOK")
      echo "$RESPONSE"

      if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
        echo "RENDER_API_KEY nebo RENDER_SERVICE_ID není nastaveno — nelze sledovat průběh deploye"
        exit 1
      fi

      echo "=== Sleduji průběh deploye (max 15 min) ==="
      for i in $(seq 1 45); do
        sleep 20
        DEPLOY=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
          "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1")

        STATUS=$(echo "$DEPLOY" | jq -r '.[0].deploy.status // empty')

        if [ -z "$STATUS" ] || [ "$STATUS" = "null" ]; then
          echo "[$i/45] Čekám na zahájení deploye..."
          continue
        fi

        echo "[$i/45] Status: $STATUS"

        case "$STATUS" in
          live)
            echo "Deploy úspěšný!"
            exit 0
            ;;
          build_failed|update_failed|canceled|deactivated)
            echo "Deploy selhal: $STATUS"
            echo "$DEPLOY" | jq '.[0].deploy'
            exit 1
            ;;
          created|queued|pre_deploy_in_progress|building|update_in_progress)
            echo "-> Deploy stále běží"
            ;;
          *)
            echo "-> Neznámý status: $STATUS"
            ;;
        esac
      done

      echo "Deploy timeout po 15 minutách"
      exit 1
  only:
    - main
  needs:
    - backend-test
