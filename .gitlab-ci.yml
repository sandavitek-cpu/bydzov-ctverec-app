# =============================================================
# GitLab CI/CD Pipeline — Novobydžovský čtverec app
# =============================================================
# Stages:
#   1. test   — build + unit test backendu
#   2. build  — build frontendu (Vue 3 + Vite)
#   3. deploy — GitLab Pages (frontend) + RPI (backend)
# =============================================================
# Všechny joby běží na RPI runneru (tag: rpi) — 0 shared min.
# RPI runner musí být online, jinak pipeline čeká.
# =============================================================

stages:
  - test
  - build
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository
    - frontend/node_modules/

.test-backend: &test-backend
  - cd backend
  - mvn $MAVEN_CLI_OPTS test

.build-frontend: &build-frontend
  - cd frontend
  - npm ci
  - npm run build

# ---------------------------------------------------------------
# STAGE: test — Backend
# ---------------------------------------------------------------
backend-test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  tags: [rpi]
  script: *test-backend
  artifacts:
    when: always
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never

# ---------------------------------------------------------------
# STAGE: build — Frontend
# ---------------------------------------------------------------
frontend-build:
  stage: build
  image: node:20-alpine
  tags: [rpi]
  variables:
    VITE_API_BASE_URL: "https://bydzov-ctverec-api.onrender.com"
    VITE_GOOGLE_CLIENT_ID: "$VITE_GOOGLE_CLIENT_ID"
  script: *build-frontend
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never

# ---------------------------------------------------------------
# STAGE: deploy — GitLab Pages (frontend)
# ---------------------------------------------------------------
pages:
  stage: deploy
  image: alpine:latest
  tags: [rpi]
  script:
    - mkdir -p public
    - cp -r frontend/dist/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  needs:
    - frontend-build

# ---------------------------------------------------------------
# STAGE: deploy — RPI (backend)
# ---------------------------------------------------------------
deploy-backend:
  stage: deploy
  tags: [rpi]
  variables:
    DEPLOY_DIR: /home/gitlab-runner/bydzov-api
  script:
    - |
      echo "=== Build JAR ==="
      cd $CI_PROJECT_DIR/backend && mvn -B -ntp package -DskipTests

      echo "=== Priprava deploy adresare ==="
      mkdir -p "$DEPLOY_DIR"

      echo "=== Kopirovani JARu ==="
      cp "$CI_PROJECT_DIR/backend/target/bydzov-ctverec-api.jar" "$DEPLOY_DIR/"

      echo "=== Vytvoreni .env ==="
      echo "DATABASE_URL=$DATABASE_URL" > "$DEPLOY_DIR/.env"
      echo "JWT_SECRET=$JWT_SECRET" >> "$DEPLOY_DIR/.env"
      echo "GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID" >> "$DEPLOY_DIR/.env"
      echo "SMTP_HOST=smtp-relay.brevo.com" >> "$DEPLOY_DIR/.env"
      echo "SMTP_PORT=587" >> "$DEPLOY_DIR/.env"
      echo "SMTP_USER=" >> "$DEPLOY_DIR/.env"
      echo "SMTP_PASS=" >> "$DEPLOY_DIR/.env"
      echo "PORT=8080" >> "$DEPLOY_DIR/.env"
      chmod 600 "$DEPLOY_DIR/.env"

      echo "=== Restart service ==="
      sudo systemctl restart bydzov-api

      echo "=== Deploy hotov ==="
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  needs:
    - backend-test

# ---------------------------------------------------------------
# STAGE: deploy — Sync to GitHub (Docker Hub → Render)
# ---------------------------------------------------------------
sync-to-github:
  stage: deploy
  tags: [rpi]
  variables:
    GIT_STRATEGY: clone
  script:
    - git remote add github "https://vitsanda:${GITHUB_PAT}@github.com/sandavitek-cpu/bydzov-ctverec-app.git"
    - git push -f github HEAD:main
    - echo "Sync OK - GitHub Actions spusti Docker build"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $GITHUB_PAT != null && $GITHUB_PAT != ""'
      when: on_success
    - when: never
  needs:
    - deploy-backend
